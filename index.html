<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Referral Hub</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
}

nav{
background:#4f46e5;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
flex-wrap:wrap;
}

nav a{
color:white;
text-decoration:none;
margin-right:10px;
}

nav button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
}

.hero{
text-align:center;
padding:60px 20px;
background:linear-gradient(135deg,#4f46e5,#7c3aed);
color:white;
}

.search-box{
width:90%;
max-width:500px;
padding:12px;
border:none;
border-radius:10px;
margin-top:15px;
}

.section{
padding:30px 20px;
}

.section-title{
text-align:center;
margin-bottom:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.join-btn{
display:block;
text-align:center;
background:#4f46e5;
color:white;
padding:10px;
border-radius:10px;
text-decoration:none;
margin-top:10px;
}

footer{
background:#111827;
color:white;
text-align:center;
padding:20px;
margin-top:30px;
}
</style>
</head>

<body>

<nav>
<h2>Referral Hub</h2>

<div>
<a href="#">Home</a>
<a href="#">Offers</a>

<button id="loginBtn">Login</button>
<button id="logoutBtn" style="display:none;">Logout</button>

<span id="userName"></span>
</div>
</nav>

<section class="hero">
<h1>Earn More With Referral Programs</h1>
<p>Discover trusted apps and earn rewards.</p>
<input class="search-box" placeholder="Search offers...">
</section>

<section class="section">
<h2 class="section-title">Featured Offers</h2>

<div class="cards" id="offersContainer"></div>
<h3>Angel One</h3>
<p>₹500 Bonus</p>
<a href="#" class="join-btn">Join Now</a>
</div>

<div class="card">
<h3>Groww</h3>
<p>₹100 Bonus</p>
<a href="#" class="join-btn">Join Now</a>
</div>

<div class="card">
<h3>Upstox</h3>
<p>₹300 Bonus</p>
<a href="#" class="join-btn">Join Now</a>
</div>

</div>
</section>
<section class="section" id="adminPanel" style="display:none;">
<h2 class="section-title">Admin Panel</h2>

<input type="text" id="appName" placeholder="App Name"><br><br>

<input type="text" id="bonus" placeholder="Bonus"><br><br>

<input type="text" id="category" placeholder="Category"><br><br>

<input type="text" id="link" placeholder="Referral Link"><br><br>

<button id="addOfferBtn">Add Offer</button>

</section>
<footer>
© 2026 Referral Hub
</footer>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
addDoc
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyCYVw59Fb3Ppx44V7wigjkb_rGDIxx_dOk",
authDomain: "refferal-hub-89b90.firebaseapp.com",
projectId: "refferal-hub-89b90",
storageBucket: "refferal-hub-89b90.firebasestorage.app",
messagingSenderId: "1055946062854",
appId: "1:1055946062854:web:2be7e32ad6d6cf35c79787"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
document.getElementById("loginBtn").onclick = async () => {

const email = prompt("Enter Email");
const password = prompt("Enter Password");

try{
await signInWithEmailAndPassword(auth,email,password);
alert("Login Successful");
}catch(e){

try{
await createUserWithEmailAndPassword(auth,email,password);
alert("Account Created");
}catch(err){
alert(err.message);
}

}

};

document.getElementById("logoutBtn").onclick = () => {
signOut(auth);
};

onAuthStateChanged(auth,(user)=>{

if(user.email === "vijaylodhi301@gmail.com"){
document.getElementById("adminPanel").style.display = "block";
}
document.getElementById("userName").innerText =
"Welcome " + user.email;

document.getElementById("logoutBtn").style.display =
"inline-block";

}else{
document.getElementById("adminpanel").innerText = "";
document.getElementById("logoutBtn").style.display =
"none";
}

});
async function loadOffers(){

const container =
document.getElementById("offersContainer");

container.innerHTML = "";

const querySnapshot =
await getDocs(collection(db,"Offer"));

querySnapshot.forEach((doc)=>{

const data = doc.data();

container.innerHTML += `
<div class="card">
<h3>${data.AppName}</h3>
<p>₹${data.Bonus} Bonus</p>
<a href="${data.Link}"
target="_blank"
class="join-btn">
Join Now
</a>
</div>
`;

});

}

loadOffers();
  document.getElementById("addOfferBtn").onclick =
async () => {

await addDoc(collection(db,"Offer"),{

AppName:
document.getElementById("appName").value,

Bonus:
document.getElementById("bonus").value,

Category:
document.getElementById("category").value,

Link:
document.getElementById("link").value,

Status:"Active"

});

alert("Offer Added Successfully");

loadOffers();

};
</script>

</body>
</html>
